# ── File upload ────────────────────────────────────────────────────────────────
file.upload-dir=/uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" auto-adds new columns (priority, caseId, createdAt) without dropping data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FIX: Register JavaTimeModule so Jackson can serialize LocalDateTime.
# Without this, GET /api/events returns 500 because Jackson doesn't know
# how to handle LocalDateTime out of the box.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.converters.preferred-json-mapper=jackson

# FIX: Tell Spring to auto-register Jackson modules found on the classpath,
# including jackson-datatype-jsr310 (JavaTimeModule). This is the key line
# that makes LocalDateTime serialization work without any extra Java config.
spring.jackson.mapper.default-view-inclusion=true
server.port=10000